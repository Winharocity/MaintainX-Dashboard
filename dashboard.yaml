      # ==== OTHER ====
      - type: custom:auto-entities
        card:
          type: grid
          columns: 3
          square: true
          title: 📦 Other Equipment
        card_param: cards
        filter:
          template: >
            {% set items = states.sensor
                | selectattr('entity_id', 'match', 'sensor.maintainx_asset_.*') 
                | list %}
            {% set result = namespace(cards=[]) %}
            {% for e in items %}
              {% set n = (state_attr(e.entity_id, 'name') or '') | lower %}
              {% set d = (state_attr(e.entity_id, 'description') or '') | lower %}
              {% set c = n ~ ' ' ~ d %}
              {% set boat_names = ['corsair','topaz','boomerang','ultimate','laser','optimist','sabot','pacer','manly junior','flying 11','flying eleven','sabre','tasar','420','470','29er','49er','finn','mirror','heron','minnow','sunfish','vaurien','snipe','fireball','cherub','moth','impulse','sailfish','holdfast','contender','starling','p class','sunburst','sun burst','feva','pico','bahia','fusion','vago','stratos','bug','xenon','omega','solo','streaker','musto skiff','skiff','yacht','catamaran','cat rig','dinghy','sailboat','sail boat','sailing boat','trimaran','hobie'] %}
              {% set rigging_names = ['boom','mast','rudder','tiller','centerboard','centreboard','daggerboard','shackle','shackel','halyard','pulley','block','cleat','shroud','jib','mainsail','spinnaker','batten','gooseneck','kicker','vang','sheet','foil','rigging'] %}
              {% set is_boat = false %}
              {% for name in boat_names %}
                {% if name in n %}
                  {% set is_boat = true %}
                {% endif %}
              {% endfor %}
              {% set is_rigging = false %}
              {% for name in rigging_names %}
                {% if name == n or n.endswith(' ' ~ name) or n.startswith(name ~ ' ') or (' ' ~ name ~ ' ') in n or n.endswith(name ~ 's') %}
                  {% set is_rigging = true %}
                {% endif %}
              {% endfor %}
              {% if 'sail' == n or n == 'sails' or n.endswith(' sail') or n.endswith(' sails') %}
                {% set is_rigging = true %}
              {% endif %}
              {% set is_power = 'power boat' in c or 'powerboat' in c or 'speedboat' in c or 'motorboat' in c or 'runabout' in c or 'tinny' in c or 'tinnie' in c or 'aluminium boat' in c or 'aluminum boat' in c or 'rescue boat' in c or 'safety boat' in c or 'rib' in c or 'inflatable' in c or 'zodiac' in c or 'jet ski' in c or 'jetski' in c %}
              {% set is_paddle = 'kayak' in c or 'canoe' in c or 'paddleboard' in c or 'sup ' in c or 'stand up paddle' in c or 'rowboat' in c %}
              {% set is_generic_boat = ('boat' in c or 'vessel' in c or 'rover' in c) and not is_rigging %}
              {% set is_engine = 'engine' in c or 'outboard' in c or 'inboard' in c or 'mercury' in c or 'yamaha' in c or 'suzuki' in c or 'evinrude' in c or 'tohatsu' in c %}
              {% set is_trailer = 'trailer' in n or 'trolley' in n %}
              {% set is_safety = 'safety' in c or 'life jacket' in c or 'lifejacket' in c or 'pfd' in c or 'flare' in c or 'fire extinguisher' in c or 'epirb' in c or 'first aid' in c %}
              {% set is_tool = 'tool' in n or 'drill' in n or 'wrench' in n or 'grinder' in n or 'hammer' in n or n == 'saw' %}
              {% if not (is_boat or is_rigging or is_power or is_paddle or is_generic_boat or is_engine or is_trailer or is_safety or is_tool) %}
                {% set safe = state_attr(e.entity_id, 'is_safe') %}
                {% set result.cards = result.cards + [{
                  'type': 'custom:mushroom-template-card',
                  'entity': e.entity_id,
                  'primary': state_attr(e.entity_id, 'name'),
                  'secondary': ('✅ Safe' if safe else '🚫 Not Safe'),
                  'icon': 'mdi:package-variant',
                  'icon_color': ('green' if safe else 'red'),
                  'layout': 'vertical',
                  'fill_container': true,
                  'tap_action': {'action': 'more-info'}
                }] %}
              {% endif %}
            {% endfor %}
            {{ result.cards }}
        show_empty: false
        
  ##############################################
  # TAB 7 — ALL JOBS
  ##############################################
  - title: All
    path: all
    icon: mdi:clipboard-text-clock
    badges: []
    cards:

      - type: markdown
        content: "# 📋 All Recent Jobs"

      - type: markdown
        content: |
          {% set orders = state_attr('sensor.maintainx_recent_work_orders', 'recent_work_orders') %}
          {% if orders and orders | length > 0 %}
          {% for wo in orders %}

          ---

          {% if wo.status == 'OPEN' %}🔴{% elif wo.status == 'IN_PROGRESS' %}🟡{% elif wo.status == 'ON_HOLD' %}🟠{% elif wo.status == 'DONE' %}🟢{% else %}⚪{% endif %} **{{ wo.title }}** ({{ wo.status }})

          <small>#{{ wo.id }} · {% if wo.priority == 'CRITICAL' %}🔴{% elif wo.priority == 'HIGH' %}🟠{% elif wo.priority == 'MEDIUM' %}🟡{% elif wo.priority == 'LOW' %}🟢{% else %}⚪{% endif %} {{ wo.priority }} · {{ wo.created_at[:10] if wo.created_at else '' }}{% if wo.assignees and wo.assignees | length > 0 %} · 👤 {{ wo.assignees[0].name }}{% endif %}</small>

          {% if wo.description %}
          <small>{{ wo.description[:150] }}{% if wo.description | length > 150 %}...{% endif %}</small>
          {% endif %}

          {% endfor %}
          {% else %}
          No work orders found
          {% endif %}
